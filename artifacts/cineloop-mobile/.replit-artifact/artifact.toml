kind = "mobile"
previewPath = "/mobile/"
title = "CineLoop Mobile"
version = "1.0.0"
id = "artifacts/cineloop-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 23890

[services.development]
run = "pnpm --filter @workspace/cineloop-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cineloop-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cineloop-mobile", "run", "serve" ]

[services.env]
PORT = "23890"
BASE_PATH = "/mobile/"
