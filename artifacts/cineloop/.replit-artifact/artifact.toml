kind = "web"
previewPath = "/"
title = "CineLoop"
version = "1.0.0"
id = "artifacts/cineloop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24072

[services.development]
run = "pnpm --filter @workspace/cineloop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cineloop", "run", "build" ]
publicDir = "artifacts/cineloop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24072"
BASE_PATH = "/"
